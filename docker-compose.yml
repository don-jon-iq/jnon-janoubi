# =====================================================
# جنون جنوبي — Docker Compose (alternative to the
# Dokploy "Application/Dockerfile" path).
#
# In Dokploy: create a "Compose" service pointing at this
# repo, then in the Domains tab attach your domain to
# service "web" on port 80 (Dokploy injects the Traefik
# labels for you and terminates HTTPS via Let's Encrypt).
#
# Plain server (no Dokploy):  docker compose up -d --build
# then visit http://<server-ip>:8080
# =====================================================
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jnon-janoubi:latest
    container_name: jnon-janoubi
    restart: unless-stopped
    # Internal port Dokploy/Traefik routes to:
    expose:
      - "80"
    # Host mapping for running outside Dokploy (remove if Dokploy
    # complains about a port clash — Traefik doesn't need it):
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
