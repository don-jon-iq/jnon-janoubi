# =====================================================
# جنون جنوبي — nginx server block
# =====================================================
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Charset (Arabic content) ----
    charset utf-8;
    charset_types text/css application/javascript text/plain;

    # ---- Compression ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Long cache for fingerprint-free static assets ----
    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # ---- Video: allow byte-range requests, modest cache ----
    location ~* \.(?:mp4|webm|mov)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
        access_log off;
        try_files $uri =404;
    }

    # ---- HTML: never cache (so config/price edits go live instantly) ----
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---- App routes ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Don't serve hidden/meta files ----
    location ~ /\.(?!well-known) {
        deny all;
    }
}
